name: tight_liquidity
description: Conservative calibration for thinner liquidity and stricter participation assumptions
market_curve:
  buckets:
    - label: open
      volume_share: 0.3
      slippage_multiplier: 1.3
    - label: mid_morning
      volume_share: 0.15
      slippage_multiplier: 1.05
    - label: midday
      volume_share: 0.1
      slippage_multiplier: 1.0
    - label: afternoon
      volume_share: 0.15
      slippage_multiplier: 1.05
    - label: close
      volume_share: 0.3
      slippage_multiplier: 1.25
defaults:
  participation_limit: 0.08
  allow_partial_fill: true
  force_completion: false

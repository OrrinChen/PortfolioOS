project:
  name: PortfolioOS
  disclaimer: "Auxiliary decision-support tool only. Not investment advice."

trading:
  market: us
  lot_size: 1
  allow_fractional_shares_in_optimizer: true

fees:
  commission_rate: 0.0003
  transfer_fee_rate: 0.0
  stamp_duty_rate: 0.0

slippage:
  k: 0.015

objective_weights:
  transaction_cost: 0.5
  target_deviation: 100000.0
  transaction_fee: 0.5
  turnover_penalty: 0.015
  slippage_penalty: 0.5

risk_model:
  enabled: true
  integration_mode: augment
  returns_path: ../data/risk_inputs_us_expanded/returns_long.csv
  factor_exposure_path: ../data/risk_inputs_us_expanded/factor_exposure.csv

solver:
  name: CLARABEL
  max_iters: 5000
  eps: 0.0001

reporting:
  top_weight_changes: 5
  top_findings: 10

simulation:
  mode: impact_aware

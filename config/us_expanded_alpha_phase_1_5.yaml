project:
  name: PortfolioOS
  disclaimer: "Auxiliary decision-support tool only. Not investment advice."

trading:
  market: us
  lot_size: 1
  allow_fractional_shares_in_optimizer: true

fees:
  commission_rate: 0.0003
  transfer_fee_rate: 0.0
  stamp_duty_rate: 0.0

slippage:
  k: 3.498400399110418
  alpha: 0.6

objective_weights:
  risk_term: 1.0
  tracking_error: 1.0
  transaction_cost: 1.0
  transaction_cost_objective_mode: nav_fraction
  alpha_weight: 1.0
  target_deviation: 0.0
  transaction_fee: 0.0
  turnover_penalty: 0.0
  slippage_penalty: 0.0

risk_model:
  enabled: true
  integration_mode: augment
  returns_path: ../data/risk_inputs_us_expanded/returns_long.csv
  factor_exposure_path: ../data/risk_inputs_us_expanded/factor_exposure.csv

solver:
  name: CLARABEL
  max_iters: 5000
  eps: 0.0001

reporting:
  top_weight_changes: 5
  top_findings: 10

simulation:
  mode: impact_aware

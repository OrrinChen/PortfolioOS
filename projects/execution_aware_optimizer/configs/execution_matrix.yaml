experiment_name: execution_matrix

alpha_input:
  path: null
  rank_normalize_by_date: true
  winsorize_quantile: 0.01

portfolioos:
  backtest_manifest: data/backtest_samples/manifest_us_expanded_alpha_phase_1_5.yaml
  allow_portfolioos_run: false
  transaction_cost_objective_mode: nav_fraction
  output_dir: projects/execution_aware_optimizer/reports/execution_matrix

layers:
  - layer_name: raw_top_alpha_equal_weight
  - layer_name: risk_controlled
  - layer_name: sector_constrained
  - layer_name: position_constrained
  - layer_name: turnover_constrained
  - layer_name: liquidity_constrained
  - layer_name: full_execution_aware_cost_adjusted

cost_sensitivity_bps:
  - 1
  - 5
  - 10
  - 25
  - 50

execution_matrix:
  cost_bps:
    - 1
    - 5
    - 10
    - 25
    - 50
  participation_rates:
    - 0.001
    - 0.005
    - 0.01
  liquidity_buckets:
    - high
    - medium
    - low
  constraint_levels:
    - raw
    - risk_aware
    - full_execution_aware
  execution_modes:
    - impact_aware
    - participation_twap

report_path: projects/execution_aware_optimizer/reports/execution_aware_optimizer_report.md

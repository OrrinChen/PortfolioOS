schema_version: factor_spec.v2
factor_id: trend_slope_3m
formula_version: price_volume_29_mechanism_v2
formula_hash: a6662c7beada11d4
formula_summary: 3m log-price OLS trend quality.
design_contract:
  design_contract_schema: fd_factor_design_contract.v1
  factor_id: trend_slope_3m
  market_pain_point: Endpoint returns can confuse smooth trend with noisy round trips.
  mechanism_hypothesis: Smooth directional pressure may be more persistent than choppy
    endpoint momentum.
  investor_constraint_or_behavior: Trend-following and risk-managed flows may favor
    stable paths.
  expected_universe: Daily price histories with enough observations for path-quality
    measurement.
  expected_regime: Should improve in persistent trend regimes and weaken after discontinuous
    news jumps.
  why_not_arbitraged_away: False positives, lag, and turnover limit exploitation.
  observable_pre_formula_diagnostics:
  - Path smoothness distribution
  - Endpoint-return duplicate audit
  placebo_design:
  - endpoint momentum control
  - path-shuffled placebo
  - same-coverage shuffled signal
  cost_capacity_risks:
  - lagged entries
  - turnover
  - crowding in smooth winners
  expected_failure_modes:
  - becomes momentum clone
  - lags regime shifts
  - placebo path smoothness wins
  formula_measurement_role: The formula is only a measurement of the stated market
    pain point; it is not itself the thesis.
  design_review_questions:
  - What pain point or repeated constraint creates the signal?
  - Which investors or flows plausibly create the mispricing?
  - Why should the effect persist after costs, capacity, and placebo controls?
  - Where should this mechanism fail if the thesis is real?
  not_alpha_evidence: true
  direct_q2_entry_allowed: false
design_review_required: true
pre_formula_evidence_required: true
formula_is_measurement_not_thesis: true
raw_value_definition: slope_tstat * R_squared from OLS(log_price, time_index) over
  63 trading days
oriented_score_definition: raw signed trend-quality score; higher means smoother positive
  trend
required_inputs:
- adjusted_close
fallback_policy: no fallback; insufficient price history is explicit_abstain
fallback_audit_required: true
duplicate_cluster_audit_required: true
mechanism: OLS trend quality separates smooth directional pressure from endpoint return.
mechanism_family: trend_quality
lookback: 3
required_lookback_days: 63
skip: 1
direction: positive
signal_timestamp: month_end_close
visibility_timestamp: after_month_end_close
tradable_timestamp: next_rebalance_session
timestamp_contract:
  lookback_start: signal_timestamp - skip_days - required_lookback_days
  lookback_end: last_trading_day <= signal_timestamp - skip_days
  signal_timestamp: month_end_close
  visibility_timestamp: after_month_end_close
  tradable_timestamp: next_rebalance_session
  allow_same_close_trading: false
coverage_rule:
  minimum_observations: 64
  insufficient_coverage: explicit_abstain
  abstain_reason: insufficient_price_volume_history
no_view_policy: explicit_abstain
expected_horizon: next_month_excess_return
known_correlation_family: trend_quality
known_failure_mode: Can still correlate with momentum and may lag sharp regime shifts.
no_view_is_not_zero_alpha: true
not_alpha_evidence: true
direct_q2_entry_allowed: false
production_approval_claimed: false

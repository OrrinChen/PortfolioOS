schema_version: factor_spec.v2
factor_id: liquidity_dollar_volume_1m
formula_version: price_volume_29_mechanism_v2
formula_hash: d20b1ac28a4b8b68
formula_summary: Short-term dollar-volume shock versus a trailing 6m baseline that
  excludes the recent 1m window.
design_contract:
  design_contract_schema: fd_factor_design_contract.v1
  factor_id: liquidity_dollar_volume_1m
  market_pain_point: Abnormal trading activity can reveal attention or liquidity-regime
    changes.
  mechanism_hypothesis: Dollar-volume shocks matter only if they proxy for attention,
    flows, or tradability changes.
  investor_constraint_or_behavior: Liquidity-sensitive capital may enter or exit after
    activity shocks.
  expected_universe: Names with reliable dollar-volume histories and investable ADV.
  expected_regime: Event-driven and attention-driven regimes; should fail when volume
    is only noise.
  why_not_arbitraged_away: Attention shocks can be transient and expensive to trade.
  observable_pre_formula_diagnostics:
  - ADV shock persistence
  - event/news concentration check
  placebo_design:
  - ADV-level control
  - same-capacity shuffled signal
  - rebalance-shifted placebo
  cost_capacity_risks:
  - turnover
  - spread
  - impact
  - capacity illusion
  expected_failure_modes:
  - size/liquidity exposure
  - event contamination
  - placebo volume shock dominance
  formula_measurement_role: The formula is only a measurement of the stated market
    pain point; it is not itself the thesis.
  design_review_questions:
  - What pain point or repeated constraint creates the signal?
  - Which investors or flows plausibly create the mispricing?
  - Why should the effect persist after costs, capacity, and placebo controls?
  - Where should this mechanism fail if the thesis is real?
  not_alpha_evidence: true
  direct_q2_entry_allowed: false
design_review_required: true
pre_formula_evidence_required: true
formula_is_measurement_not_thesis: true
raw_value_definition: log(ADV_1m / ADV_6m_baseline_excluding_recent_1m)
oriented_score_definition: raw liquidity shock; higher means recent dollar volume
  is unusually elevated
required_inputs:
- adjusted_close
- volume
fallback_policy: no fallback; missing price or volume windows are explicit_abstain
fallback_audit_required: true
duplicate_cluster_audit_required: true
mechanism: Recent dollar-volume shocks may capture attention or liquidity regime changes.
mechanism_family: liquidity_shock
lookback: 1
required_lookback_days: 147
skip: 1
direction: positive
signal_timestamp: month_end_close
visibility_timestamp: after_month_end_close
tradable_timestamp: next_rebalance_session
timestamp_contract:
  lookback_start: signal_timestamp - skip_days - required_lookback_days
  lookback_end: last_trading_day <= signal_timestamp - skip_days
  signal_timestamp: month_end_close
  visibility_timestamp: after_month_end_close
  tradable_timestamp: next_rebalance_session
  allow_same_close_trading: false
coverage_rule:
  minimum_observations: 148
  insufficient_coverage: explicit_abstain
  abstain_reason: insufficient_price_volume_history
no_view_policy: explicit_abstain
expected_horizon: next_month_excess_return
known_correlation_family: liquidity_shock
known_failure_mode: Can be event attention rather than durable alpha and may raise
  turnover.
no_view_is_not_zero_alpha: true
not_alpha_evidence: true
direct_q2_entry_allowed: false
production_approval_claimed: false

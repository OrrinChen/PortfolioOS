schema_version: factor_spec.v2
factor_id: turnover_1m
formula_version: price_volume_29_mechanism_v2
formula_hash: 65e1401d5baa89ae
formula_summary: Abnormal 1m turnover z-score versus a trailing 6m baseline excluding
  the recent 1m window.
design_contract:
  design_contract_schema: fd_factor_design_contract.v1
  factor_id: turnover_1m
  market_pain_point: Abnormal turnover can reveal attention, flow pressure, or temporary
    crowding.
  mechanism_hypothesis: Turnover shocks matter only when they reflect non-random flow
    imbalance.
  investor_constraint_or_behavior: Flow-driven investors and liquidity providers adjust
    around abnormal activity.
  expected_universe: Names with PIT shares outstanding or float coverage.
  expected_regime: Attention or forced-flow regimes; should fail when activity is
    noisy.
  why_not_arbitraged_away: Turnover shocks decay quickly and can be expensive to trade.
  observable_pre_formula_diagnostics:
  - Turnover shock persistence
  - shares-data quality audit
  placebo_design:
  - volume-only proxy control
  - capacity-matched placebo
  - rebalance-shifted placebo
  cost_capacity_risks:
  - turnover
  - spread
  - impact
  - shares-data degradation
  expected_failure_modes:
  - volume proxy only
  - event noise
  - cost-adjusted failure
  formula_measurement_role: The formula is only a measurement of the stated market
    pain point; it is not itself the thesis.
  design_review_questions:
  - What pain point or repeated constraint creates the signal?
  - Which investors or flows plausibly create the mispricing?
  - Why should the effect persist after costs, capacity, and placebo controls?
  - Where should this mechanism fail if the thesis is real?
  not_alpha_evidence: true
  direct_q2_entry_allowed: false
design_review_required: true
pre_formula_evidence_required: true
formula_is_measurement_not_thesis: true
raw_value_definition: (TO_1m - TO_6m_baseline_excluding_recent_1m) / TO_6m_std
oriented_score_definition: raw abnormal turnover score; higher means unusually elevated
  short-term turnover
required_inputs:
- volume
- shares_float_or_shares_outstanding
fallback_policy: shares_float -> shares_outstanding -> volume-based proxy; fallback
  is audited as degraded evidence
fallback_audit_required: true
duplicate_cluster_audit_required: true
mechanism: Abnormal turnover z-score captures short-term trading activity shocks.
mechanism_family: turnover_shock
lookback: 1
required_lookback_days: 147
skip: 1
direction: positive
signal_timestamp: month_end_close
visibility_timestamp: after_month_end_close
tradable_timestamp: next_rebalance_session
timestamp_contract:
  lookback_start: signal_timestamp - skip_days - required_lookback_days
  lookback_end: last_trading_day <= signal_timestamp - skip_days
  signal_timestamp: month_end_close
  visibility_timestamp: after_month_end_close
  tradable_timestamp: next_rebalance_session
  allow_same_close_trading: false
coverage_rule:
  minimum_observations: 148
  insufficient_coverage: explicit_abstain
  abstain_reason: insufficient_price_volume_history
no_view_policy: explicit_abstain
expected_horizon: next_month_excess_return
known_correlation_family: turnover_shock
known_failure_mode: Can reflect noisy activity or news without predictive content.
no_view_is_not_zero_alpha: true
not_alpha_evidence: true
direct_q2_entry_allowed: false
production_approval_claimed: false

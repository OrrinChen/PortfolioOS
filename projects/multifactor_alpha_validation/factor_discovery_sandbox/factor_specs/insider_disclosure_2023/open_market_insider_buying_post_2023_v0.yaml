formula_summary: >
  Event-conditional open-market insider buy conviction score after post-2023
  Form 4 disclosure visibility. This is a frozen Track A measurement
  definition, not Q1 evidence, Q2 entry, portfolio construction, paper workflow,
  live workflow, or production approval.

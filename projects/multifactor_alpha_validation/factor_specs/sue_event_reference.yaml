schema_version: factor_spec.v1
factor_id: sue_event_reference
family_id: sue
display_name: SUE Event Reference
mechanism: Standardized unexpected earnings reference benchmark using strict event visibility.
mechanism_type: event_reference
data_tier: tier_3_event
status: reference
data_requirements:
  required_fields: [earnings_announcement_timestamp, consensus_estimate, actual_eps, trading_calendar]
  optional_fields: [sector, market_cap]
pit_contract:
  signal_timestamp_rule: event_available_timestamp
  visibility_timestamp_rule: public_earnings_release_timestamp
  tradable_timestamp_rule: next_trading_day_open_after_visibility
  reporting_lag_days: 0
  reject_if_missing_visibility: true
signal_definition:
  lookback_days: 0
  skip_days: 0
  transform: event_standardized_surprise
  winsorize: true
  winsorize_limits: [0.01, 0.99]
horizon:
  horizon_type: event_window
  holding_days: 21
  rebalance_frequency: event_driven
coverage:
  min_assets: 50
  min_history_days: 0
  missing_policy: explicit_abstain
neutralization:
  beta: report
  sector: report
  size: report
  liquidity: report
cost_sensitivity:
  expected_turnover: medium
  capacity_risk: medium
known_failure_modes: [event_timestamp_error, overlap_with_revision]
no_view_is_not_zero_alpha: true
non_claims:
  production_approval: false
  live_trading: false
  security_orders: false
  direct_q2_entry: false


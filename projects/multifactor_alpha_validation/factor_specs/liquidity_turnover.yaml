schema_version: factor_spec.v1
factor_id: liquidity_turnover
family_id: liquidity
display_name: Liquidity and Turnover
mechanism: Trading activity and dollar volume can proxy liquidity premia and crowding.
mechanism_type: fixed_horizon
data_tier: tier_1_price_volume
status: enabled
data_requirements:
  required_fields: [adjusted_close, volume, trading_calendar]
  optional_fields: [adv, spread_proxy]
pit_contract:
  signal_timestamp_rule: close_on_signal_date
  visibility_timestamp_rule: after_market_close
  tradable_timestamp_rule: next_trading_day_open
  reporting_lag_days: 0
  reject_if_missing_visibility: true
signal_definition:
  lookback_days: 21
  skip_days: 0
  transform: cross_sectional_rank_zscore
  winsorize: true
  winsorize_limits: [0.01, 0.99]
horizon:
  horizon_type: rebalance_period
  holding_days: 21
  rebalance_frequency: monthly
coverage:
  min_assets: 300
  min_history_days: 21
  missing_policy: explicit_abstain
neutralization:
  beta: report
  sector: report
  size: report
  liquidity: report
cost_sensitivity:
  expected_turnover: medium
  capacity_risk: high
known_failure_modes: [liquidity_proxy_misspecification, capacity_bottleneck]
no_view_is_not_zero_alpha: true
non_claims:
  production_approval: false
  live_trading: false
  security_orders: false
  direct_q2_entry: false

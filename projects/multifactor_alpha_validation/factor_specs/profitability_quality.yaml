schema_version: factor_spec.v1
factor_id: profitability_quality
family_id: quality
display_name: Profitability Quality
mechanism: Firms with stronger profitability may show persistent quality premia after public filing availability.
mechanism_type: fixed_horizon
data_tier: tier_2_fundamental
status: enabled
data_requirements:
  required_fields: [gross_profit, assets, report_date, filing_date, trading_calendar]
  optional_fields: [sector, market_cap]
pit_contract:
  signal_timestamp_rule: filing_date_plus_lag
  visibility_timestamp_rule: public_filing_available
  tradable_timestamp_rule: next_trading_day_open_after_visibility
  reporting_lag_days: 90
  reject_if_missing_visibility: true
signal_definition:
  lookback_days: 365
  skip_days: 0
  transform: cross_sectional_rank_zscore
  winsorize: true
  winsorize_limits: [0.01, 0.99]
horizon:
  horizon_type: rebalance_period
  holding_days: 63
  rebalance_frequency: quarterly
coverage:
  min_assets: 300
  min_history_days: 365
  missing_policy: explicit_abstain
neutralization:
  beta: report
  sector: report
  size: report
  liquidity: report
cost_sensitivity:
  expected_turnover: low
  capacity_risk: low
known_failure_modes: [reporting_lag_error, accounting_definition_drift]
no_view_is_not_zero_alpha: true
non_claims:
  production_approval: false
  live_trading: false
  security_orders: false
  direct_q2_entry: false

